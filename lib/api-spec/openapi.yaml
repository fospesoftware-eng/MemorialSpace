                  $ref: "#/components/schemas/GraveSearchResult"

  /public/obituaries:
    get:
      operationId: listPublicObituaries
      tags: [public]
      summary: List published obituaries (public)
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Published obituaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Obituary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        cemeteryType:
          type: string
          enum: [church, private, pet, municipality, columbarium]
          description: Type of cemetery chosen at signup. Drives module visibility (e.g. enables the Columbarium module).
        featuresColumbarium:
          type: boolean
          description: True if this cemetery operates a columbarium. Always true when cemeteryType=columbarium; opt-in for cemeteryType=church.
        address:
          type: string
        city:
          type: string
        country:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        logoUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        totalPlots:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug
        - cemeteryType
        - featuresColumbarium
        - createdAt

    CreateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        cemeteryType:
          type: string
          enum: [church, private, pet, municipality, columbarium]
        featuresColumbarium:
          type: boolean
        address:
          type: string
        city:
          type: string
        country:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string
        logoUrl:
          type: string
        latitude:
          type: number
        longitude:
          type: number
      required:
        - name
        - slug

    User:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [owner, admin, manager, staff, viewer]
        status:
          type: string
          enum: [active, invited, suspended]
        jobTitle:
          type: string
        phone:
          type: string
        avatarUrl:
          type: string
        lastActiveAt:
          type: string
          format: date-time
        invitedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
