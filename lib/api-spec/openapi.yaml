      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Voided invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  # ─── PAYMENTS ────────────────────────────────────────────────────────────────

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      summary: List payments
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: invoiceId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [payments]
      summary: Record a payment against an invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Created payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /payments/{id}:
    delete:
      operationId: deletePayment
      tags: [payments]
      summary: Delete a payment (recomputes parent invoice)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── ACCOUNTING SUMMARY ──────────────────────────────────────────────────────

  /accounting/summary:
    get:
      operationId: getAccountingSummary
