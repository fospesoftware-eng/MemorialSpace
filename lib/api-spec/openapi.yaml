      summary: AR summary + aging buckets for an organization
      parameters:
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Accounting summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountingSummary"

  # ─── PUBLIC APIs ─────────────────────────────────────────────────────────────

  /public/search:
