            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ─── INVOICES ────────────────────────────────────────────────────────────────

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List invoices for an organization
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, issued, partially_paid, paid, voided]
        - name: customerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices (includes customer summary)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvoiceListItem"
    post:
      operationId: createInvoice
      tags: [invoices]
      summary: Create a draft invoice with line items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice with line items, payments, and customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceDetail"
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update a draft invoice (header + line items)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete a draft invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/issue:
    post:
      operationId: issueInvoice
      tags: [invoices]
      summary: Issue (finalize) a draft invoice — assigns invoice number
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: organizationId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Issued invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/{id}/void:
    post:
      operationId: voidInvoice
      tags: [invoices]
