            type: boolean
      responses:
        "200":
          description: List of tax rates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxRate"
    post:
      operationId: createTaxRate
      tags: [tax-rates]
      summary: Create a tax rate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxRateBody"
      responses:
        "201":
          description: Created tax rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRate"

  /tax-rates/{id}:
    put:
      operationId: updateTaxRate
      tags: [tax-rates]
      summary: Update a tax rate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaxRateBody"
      responses:
        "200":
          description: Updated tax rate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaxRate"
